<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family:sans-serif;background:#fff">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Client box -->
  <rect x="40" y="40" width="140" height="56" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="110" y="64" text-anchor="middle" font-size="14" font-weight="500" fill="#2c2c2a">Client</text>
  <text x="110" y="82" text-anchor="middle" font-size="12" fill="#5f5e5a">POST + base64 file</text>

  <!-- Arrow: Client to FastAPI -->
  <line x1="180" y1="68" x2="238" y2="68" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="209" y="60" text-anchor="middle" font-size="12" fill="#5f5e5a">request</text>

  <!-- FastAPI container -->
  <rect x="240" y="20" width="240" height="280" rx="12" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="360" y="48" text-anchor="middle" font-size="14" font-weight="500" fill="#3c3489">FastAPI App</text>
  <text x="360" y="64" text-anchor="middle" font-size="12" fill="#534ab7">Railway · Docker</text>

  <!-- Step 1 -->
  <rect x="260" y="80" width="200" height="40" rx="6" fill="#d3d1c7" stroke="#888780" stroke-width="0.5"/>
  <text x="360" y="104" text-anchor="middle" font-size="14" font-weight="500" fill="#2c2c2a">1. Verify API key</text>

  <!-- Step 2 -->
  <rect x="260" y="132" width="200" height="40" rx="6" fill="#d3d1c7" stroke="#888780" stroke-width="0.5"/>
  <text x="360" y="156" text-anchor="middle" font-size="14" font-weight="500" fill="#2c2c2a">2. Decode base64</text>

  <!-- Step 3 -->
  <rect x="260" y="184" width="200" height="88" rx="6" fill="#9fe1cb" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="360" y="206" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">3. Extract text</text>
  <text x="360" y="224" text-anchor="middle" font-size="12" fill="#0f6e56">PDF → PyMuPDF</text>
  <text x="360" y="240" text-anchor="middle" font-size="12" fill="#0f6e56">DOCX → python-docx</text>
  <text x="360" y="256" text-anchor="middle" font-size="12" fill="#0f6e56">Image → Tesseract OCR</text>

  <!-- Arrow: FastAPI to Gemini -->
  <line x1="360" y1="300" x2="360" y2="348" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="392" y="330" font-size="12" fill="#5f5e5a">text + prompt</text>

  <!-- Gemini box -->
  <rect x="240" y="350" width="240" height="76" rx="8" fill="#fac775" stroke="#854f0b" stroke-width="0.5"/>
  <text x="360" y="384" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Google Gemini 2.5 Flash</text>
  <text x="360" y="404" text-anchor="middle" font-size="12" fill="#633806">Summary · Entities · Sentiment</text>

  <!-- Arrow: Gemini back loop -->
  <line x1="480" y1="388" x2="530" y2="388" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="388" x2="530" y2="160" stroke="#bbb" stroke-width="1.5"/>
  <line x1="530" y1="160" x2="482" y2="160" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="556" y="280" font-size="12" fill="#5f5e5a">JSON back</text>

  <!-- Arrow: FastAPI to Response -->
  <line x1="240" y1="160" x2="190" y2="160" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Response box -->
  <rect x="40" y="132" width="148" height="140" rx="8" fill="#9fe1cb" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="114" y="156" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">JSON response</text>
  <text x="114" y="176" text-anchor="middle" font-size="12" fill="#0f6e56">status</text>
  <text x="114" y="196" text-anchor="middle" font-size="12" fill="#0f6e56">fileName</text>
  <text x="114" y="216" text-anchor="middle" font-size="12" fill="#0f6e56">summary</text>
  <text x="114" y="236" text-anchor="middle" font-size="12" fill="#0f6e56">entities</text>
  <text x="114" y="256" text-anchor="middle" font-size="12" fill="#0f6e56">sentiment</text>

  <!-- 401 arrow -->
  <line x1="240" y1="100" x2="190" y2="100" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="215" y="92" text-anchor="middle" font-size="12" fill="#5f5e5a">401</text>

  <!-- Legend -->
  <rect x="40" y="460" width="14" height="14" rx="3" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="62" y="472" font-size="12" fill="#5f5e5a">API layer</text>
  <rect x="140" y="460" width="14" height="14" rx="3" fill="#9fe1cb" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="162" y="472" font-size="12" fill="#5f5e5a">Extraction / Response</text>
  <rect x="310" y="460" width="14" height="14" rx="3" fill="#fac775" stroke="#854f0b" stroke-width="0.5"/>
  <text x="332" y="472" font-size="12" fill="#5f5e5a">AI model</text>
  <rect x="400" y="460" width="14" height="14" rx="3" fill="#d3d1c7" stroke="#888780" stroke-width="0.5"/>
  <text x="422" y="472" font-size="12" fill="#5f5e5a">Processing steps</text>
</svg>
